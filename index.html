<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Antique&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #d4af37;
    --gold-dim: rgba(212,175,55,0.45);
    --gold-faint: rgba(212,175,55,0.12);
    --felt: #111a0a;
    --felt-mid: #1a2810;
    --text-bright: rgba(255,255,255,0.88);
    --text-mid: rgba(255,255,255,0.45);
    --text-dim: rgba(255,255,255,0.25);
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(212,175,55,0.2);
    --card-hover: rgba(212,175,55,0.08);
    --card-hover-border: rgba(212,175,55,0.55);
  }

  html, body {
    min-height: 100vh;
    background: var(--felt);
    color: var(--text-bright);
    font-family: 'Noto Serif JP', serif;
  }

  body {
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 12px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 12px),
      radial-gradient(ellipse 80% 60% at 50% 30%, var(--felt-mid) 0%, var(--felt) 70%);
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    position: relative;
  }

  .border-frame {
    position: fixed;
    inset: 16px;
    border: 1px solid rgba(212,175,55,0.18);
    border-radius: 10px;
    pointer-events: none;
    z-index: 100;
  }
  .border-frame::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 0.5px solid rgba(212,175,55,0.08);
    border-radius: 6px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.8s ease both;
  }
  .header-kana {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold-dim);
    margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Zen Antique', serif;
    font-size: clamp(36px, 8vw, 56px);
    color: var(--gold);
    letter-spacing: 0.18em;
    line-height: 1.1;
    margin-bottom: 12px;
    text-shadow: 0 0 60px rgba(212,175,55,0.2);
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.25em;
  }

  /* Decorative tile row */
  .tile-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 32px;
    animation: fadeUp 0.9s 0.1s ease both;
  }
  .deco-tile {
    width: 36px;
    height: 48px;
    border-radius: 3px;
    border-bottom: 3px solid #b8a888;
    box-shadow: 0 3px 8px rgba(0,0,0,0.6);
    cursor: default;
    transition: transform 0.18s;
    overflow: hidden;
    background: #f5f0e8;
  }
  .deco-tile:hover { transform: translateY(-4px); }
  .deco-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 1.0s 0.15s ease both;
  }
  .div-line { flex: 1; height: 0.5px; background: linear-gradient(to right, transparent, rgba(212,175,55,0.35), transparent); }
  .div-diamond { width: 6px; height: 6px; background: var(--gold-dim); transform: rotate(45deg); flex-shrink: 0; }

  /* Mode cards */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
    animation: fadeUp 1.0s 0.2s ease both;
  }
  @media(max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } }

  .mode-card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 12px;
    padding: 24px 22px 22px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .mode-card:hover {
    background: var(--card-hover);
    border-color: var(--card-hover-border);
    transform: translateY(-3px);
  }

  .card-icon { font-size: 28px; margin-bottom: 12px; display: block; }
  .card-title {
    font-family: 'Zen Antique', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .card-title-en {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-hr { height: 0.5px; background: var(--gold-faint); margin-bottom: 12px; }
  .card-desc { font-size: 12px; color: var(--text-mid); line-height: 1.8; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 14px; }
  .tag {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .tag-gold { background: rgba(212,175,55,0.13); color: rgba(212,175,55,0.75); border: 0.5px solid rgba(212,175,55,0.25); }
  .tag-red  { background: rgba(192,57,43,0.13);  color: rgba(220,100,80,0.85); border: 0.5px solid rgba(192,57,43,0.25); }
  .tag-blue { background: rgba(41,128,185,0.13);  color: rgba(100,170,220,0.85); border: 0.5px solid rgba(41,128,185,0.25); }

  /* Footer row */
  .footer-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    animation: fadeUp 1.1s 0.3s ease both;
  }
  .footer-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .footer-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold-dim); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="border-frame"></div>
<div class="page">

  <header class="header">
    <p class="header-kana">まあじゃん べんきょうアプリ</p>
    <h1 class="header-title">麻雀道場</h1>
    <p class="header-sub">MAHJONG STUDY — FREE BROWSER GAME</p>
  </header>

  <div class="tile-row">
    <div class="deco-tile"><img src="img/tiles/man1.png" alt="一萬"></div>
    <div class="deco-tile"><img src="img/tiles/man9.png" alt="九萬"></div>
    <div class="deco-tile"><img src="img/tiles/pin1.png" alt="一筒"></div>
    <div class="deco-tile"><img src="img/tiles/pin9.png" alt="九筒"></div>
    <div class="deco-tile"><img src="img/tiles/sou1.png" alt="一索"></div>
    <div class="deco-tile"><img src="img/tiles/sou9.png" alt="九索"></div>
    <div class="deco-tile"><img src="img/tiles/ton.png" alt="東"></div>
    <div class="deco-tile"><img src="img/tiles/nan.png" alt="南"></div>
    <div class="deco-tile"><img src="img/tiles/sya.png" alt="西"></div>
    <div class="deco-tile"><img src="img/tiles/pei.png" alt="北"></div>
    <div class="deco-tile"><img src="img/tiles/haku.png" alt="白"></div>
    <div class="deco-tile"><img src="img/tiles/hatu.png" alt="發"></div>
    <div class="deco-tile"><img src="img/tiles/tyun.png" alt="中"></div>
  </div>

  <div class="divider">
    <div class="div-line"></div>
    <div class="div-diamond"></div>
    <div class="div-line"></div>
  </div>

  <div class="cards-grid">
    <a class="mode-card" href="nankiru.html">
      <span class="card-icon">🀇</span>
      <div class="card-title">何切る</div>
      <div class="card-title-en">What to discard</div>
      <div class="card-hr"></div>
      <p class="card-desc">13枚の手牌から最善の一打を選ぶ。牌効率・受け入れ枚数の感覚を磨く。</p>
      <div class="card-tags">
        <span class="tag tag-gold">初級</span>
        <span class="tag tag-gold">中級</span>
        <span class="tag tag-gold">上級</span>
      </div>
    </a>

    <a class="mode-card" href="score.html">
      <span class="card-icon">🀄</span>
      <div class="card-title">点数計算</div>
      <div class="card-title-en">Score calculator</div>
      <div class="card-hr"></div>
      <p class="card-desc">手牌・役・符を入力して点数を計算。符計算の仕組みも丁寧に解説。</p>
      <div class="card-tags">
        <span class="tag tag-red">符計算</span>
        <span class="tag tag-red">役一覧</span>
        <span class="tag tag-red">満貫表</span>
      </div>
    </a>

    <a class="mode-card" href="quiz.html">
      <span class="card-icon">🎴</span>
      <div class="card-title">点数クイズ</div>
      <div class="card-title-en">Score quiz</div>
      <div class="card-hr"></div>
      <p class="card-desc">「この手何点？」の問題に答えて点数感覚を身につける。解説つき。</p>
      <div class="card-tags">
        <span class="tag tag-blue">初級</span>
        <span class="tag tag-blue">中級</span>
        <span class="tag tag-blue">上級</span>
      </div>
    </a>
  </div>

  <div class="footer-row">
    <div class="footer-item"><div class="footer-dot"></div>完全無料</div>
    <div class="footer-item"><div class="footer-dot"></div>ブラウザのみ</div>
    <div class="footer-item"><div class="footer-dot"></div>登録不要</div>
  </div>

</div>
</body>
</html>
