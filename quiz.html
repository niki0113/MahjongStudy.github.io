<script>
// ── tiles.js インライン ──
const TILE_IMG_BASE='img/tiles/';
function tileFile(key){return TILE_IMG_BASE+key+'.png';}
const SUIT_KEYS={man:['man1','man2','man3','man4','man5','man6','man7','man8','man9'],pin:['pin1','pin2','pin3','pin4','pin5','pin6','pin7','pin8','pin9'],sou:['sou1','sou2','sou3','sou4','sou5','sou6','sou7','sou8','sou9'],ji:['ton','nan','sya','pei','haku','hatu','tyun']};
const TILE_LABEL={man1:'一',man2:'二',man3:'三',man4:'四',man5:'五',man6:'六',man7:'七',man8:'八',man9:'九',pin1:'①',pin2:'②',pin3:'③',pin4:'④',pin5:'⑤',pin6:'⑥',pin7:'⑦',pin8:'⑧',pin9:'⑨',sou1:'1s',sou2:'2s',sou3:'3s',sou4:'4s',sou5:'5s',sou6:'6s',sou7:'7s',sou8:'8s',sou9:'9s',ton:'東',nan:'南',sya:'西',pei:'北',haku:'白',hatu:'發',tyun:'中',back:'？'};
const AKA_KEYS={man5:'man5_aka',pin5:'pin5_aka',sou5:'sou5_aka'};
function makeTileEl(key,aka=false,yoko=false,extraClass=''){
  const wrap=document.createElement('div');
  let cls='tile-wrap';
  if(yoko)cls+=' tile-yoko';
  if(extraClass)cls+=' '+extraClass;
  wrap.className=cls; wrap.dataset.key=key;
  const img=document.createElement('img');
  let fileKey=key;
  if(aka&&AKA_KEYS[key])fileKey=AKA_KEYS[key];
  if(yoko)fileKey=fileKey+'_yoko';
  img.src=tileFile(fileKey); img.alt=TILE_LABEL[key]||key;
  img.onerror=function(){wrap.textContent=TILE_LABEL[key]||key;wrap.classList.add('tile-fallback');};
  wrap.appendChild(img);
  return wrap;
}
</script>

<script>

*/

  /* ══════ 初級 ══════ */

  // Q1: 1翻30符 子ロン（両面待ち→0符、基本30符）
  {difficulty:'easy',
   text:'東場西家（子）、立直のみ1翻30符でロンあがり。点数はいくら？',

   agari:'man9', agariType:'ron',
   machi:'両面待ち（八・九萬）',
   fu:30, han:1,
   conds:[{label:'東場'},{label:'子（西家）'},{label:'ロン'},{label:'1翻30符',accent:true},{label:'立直のみ'},{label:'両面待ち'}],
   answer:1000,choices:[1000,2000,1500,500],
   answerNote:'1翻30符 → 子ロン1000点',
   explanation:'基本点 = 30 × 2^(1+2) = 240点。子ロンは×4 = 960 → 切り上げ1000点。両面待ちのロンは符の加算なし（0符）。30符はベースの符数。'},

  // Q2: 2翻30符 子ロン（両面待ち）
  {difficulty:'easy',
   text:'東場北家（子）、立直1翻＋中1翻、計2翻30符でロンあがり。点数はいくら？',
   hand:['pin2','pin3','pin4','pin5','pin6','pin7','man3','man4','man5','tyun','tyun','tyun','pin1'],
   agari:'pin1', agariType:'ron',
   machi:'単騎待ち（①）',
   fu:30, han:2,
   conds:[{label:'東場'},{label:'子（北家）'},{label:'ロン'},{label:'2翻30符',accent:true},{label:'立直（1翻）＋中（1翻）'},{label:'単騎待ち+2符'}],
   answer:2000,choices:[2000,3900,1000,2600],
   answerNote:'2翻30符 → 子ロン2000点',
   explanation:'基本点 = 30 × 2^(2+2) = 480点。子ロンは×4 = 1920 → 切り上げ2000点。単騎待ちは+2符だが雀頭①①は符なしのため合計30符。'},

  // Q3: 2翻40符 子ロン（カンチャン待ち+2符→40符）
  {difficulty:'easy',
   text:'東場南家（子）、立直1翻＋断么九1翻、計2翻40符でロンあがり。点数はいくら？',
   hand:['pin2','pin2','pin2','pin3','pin5','pin6','pin7','pin8','man3','man4','man5','pin5','pin5'],
   agari:'pin4', agariType:'ron',
   machi:'カンチャン待ち（③〜⑤）',
   fu:40, han:2,
   conds:[{label:'東場'},{label:'子（南家）'},{label:'ロン'},{label:'2翻40符',accent:true},{label:'立直（1翻）＋断么九（1翻）'},{label:'カンチャン待ち+2符'}],
   answer:2600,choices:[2600,2000,3900,5200],
   answerNote:'2翻40符 → 子ロン2600点',
   explanation:'基本点 = 40 × 2^(2+2) = 640点。子ロンは×4 = 2560 → 切り上げ2600点。カンチャン待ちは+2符のため、30符ベースから40符に切り上がっています。'},

  // Q4: 3翻30符 子ロン（両面待ち）
  {difficulty:'easy',
   text:'東場西家（子）、立直1翻＋一発1翻＋白1翻、計3翻30符でロンあがり。点数はいくら？',
   hand:['man1','man2','man3','pin4','pin5','pin6','haku','haku','haku','man7','man8','pin9','pin9'],
   agari:'man9', agariType:'ron',
   machi:'両面待ち（七・九萬）',
   fu:30, han:3,
   conds:[{label:'東場'},{label:'子（西家）'},{label:'ロン'},{label:'3翻30符',accent:true},{label:'立直＋一発＋白'},{label:'両面待ち'}],
   answer:3900,choices:[3900,2600,5200,7700],
   answerNote:'3翻30符 → 子ロン3900点',
   explanation:'基本点 = 30 × 2^(3+2) = 960点。子ロンは×4 = 3840 → 切り上げ3900点。'},

  // Q5: 七対子 2翻25符 子ロン（単騎待ち）
  {difficulty:'easy',
   text:'東場南家（子）、七対子のみ2翻25符（固定）でロンあがり。点数はいくら？',
   hand:['man1','man1','man3','man3','pin5','pin5','pin7','pin7','sou2','sou2','ton','ton','haku'],
   agari:'haku', agariType:'ron',

   answer:1600,choices:[1600,3200,2000,2400],

let qList=[],qIdx=0,correctCount=0,answered=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  qList=shuffle(QUESTIONS);qIdx=0;correctCount=0;answered=false;
  document.getElementById('nav-correct').textContent=0;
  document.getElementById('nav-total').textContent=0;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  showQuestion();
}

function showQuestion(){
  const q=qList[qIdx]; answered=false;
  const pct=Math.round(qIdx/qList.length*100);
  document.getElementById('prog-label').textContent='問題 '+(qIdx+1)+' / '+qList.length;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('q-no').textContent='Q'+(qIdx+1);
  const dm={easy:['初級','badge-easy'],mid:['中級','badge-mid'],hard:['上級','badge-hard']};
  const badge=document.getElementById('q-badge');
  badge.textContent=dm[q.difficulty][0]; badge.className='badge '+dm[q.difficulty][1];
  document.getElementById('q-text').textContent=q.text;

  // 手牌 ＋ 区切り ＋ あがり牌
  const handEl=document.getElementById('q-hand');
  handEl.innerHTML='';
  q.hand.forEach(k=>{
    const w=makeTileEl(k.replace('_aka',''),k.includes('_aka'));
    handEl.appendChild(w);
  });
  // 縦線区切り
  const sep=document.createElement('div');
  sep.className='hand-sep';
  handEl.appendChild(sep);
  // あがり牌
  const agariWrap=document.createElement('div');
  agariWrap.className='agari-label-wrap';
  const agariLbl=document.createElement('span');
  agariLbl.className='agari-label';
  agariLbl.textContent=q.agariType==='ron'?'ロン':'ツモ';
  const agariTile=makeTileEl(q.agari.replace('_aka',''),q.agari.includes('_aka'),false,'agari-tile');
  agariWrap.appendChild(agariLbl);
  agariWrap.appendChild(agariTile);
  handEl.appendChild(agariWrap);

  // 待ちメモ
  document.getElementById('q-hand-note').textContent='待ち: '+q.machi;

  // 条件ピル
  document.getElementById('q-cond').innerHTML=q.conds.map(c=>'<span class="cond-pill'+(c.accent?' accent':'')+'">'+c.label+'</span>').join('');

  // 選択肢
  const shuffled=shuffle(q.choices);
  const choicesEl=document.getElementById('q-choices');
  choicesEl.innerHTML='';
  shuffled.forEach(val=>{
    const b=document.createElement('button');
    b.className='choice-btn'; b.textContent=val.toLocaleString()+'点'; b.dataset.val=val;
    b.onclick=()=>selectAnswer(val,q);
    choicesEl.appendChild(b);
  });

  document.getElementById('q-feedback').style.display='none';
  document.getElementById('q-feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='fadeIn 0.35s ease';
}

function selectAnswer(val,q){
  if(answered)return; answered=true;
  const isCorrect=val===q.answer;
  if(isCorrect)correctCount++;
  document.getElementById('nav-correct').textContent=correctCount;
  document.getElementById('nav-total').textContent=qIdx+1;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    const bv=parseInt(b.dataset.val);
    if(bv===q.answer)b.classList.add('correct');
    else if(bv===val&&!isCorrect)b.classList.add('wrong');
  });
  const fb=document.getElementById('q-feedback');
  fb.style.display='block'; fb.className='feedback '+(isCorrect?'correct-fb':'wrong-fb');
  const title=document.getElementById('fb-title');
  title.className='fb-title '+(isCorrect?'fb-correct':'fb-wrong');
  title.textContent=isCorrect?'✓ 正解！':'✗ 不正解';
  document.getElementById('fb-note').textContent='正解: '+q.answer.toLocaleString()+'点　— '+q.answerNote;
  document.getElementById('fb-body').textContent=q.explanation;
  const nb=document.getElementById('next-btn');
  nb.style.display='block'; nb.textContent=(qIdx+1<qList.length)?'次の問題 →':'結果を見る';
}

function nextQuestion(){qIdx++;if(qIdx>=qList.length)showResult();else showQuestion();}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  const rs=document.getElementById('result-screen'); rs.style.display='block';
  document.getElementById('res-big').textContent=correctCount;
  document.getElementById('res-denom').textContent='/ '+qList.length+' 問正解';
  const pct=Math.round(correctCount/qList.length*100);
  let c='';
  if(pct>=90)c='素晴らしい！点数感覚がしっかり身についています。';
  else if(pct>=70)c='よくできました！苦手な翻数・符をもう一度復習してみましょう。';
  else if(pct>=50)c='もう少しです。満貫・跳満・倍満の早見表を確認してから再チャレンジを。';
  else c='基礎から復習しましょう。まず「点数計算モード」で符と翻の仕組みを確認してください。';
  document.getElementById('res-comment').textContent=c;
}

startQuiz();
</script>
