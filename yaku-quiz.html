<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>役名クイズ — 麻雀道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;700&family=Zen+Antique&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#d4af37;--gold-dim:rgba(212,175,55,0.5);
  --felt:#111a0a;--felt-mid:#1a2810;
  --text-bright:rgba(255,255,255,0.9);--text-mid:rgba(255,255,255,0.55);--text-dim:rgba(255,255,255,0.3);
  --sec-bg:rgba(255,255,255,0.04);--sec-border:rgba(212,175,55,0.18);
  --correct:rgba(39,160,80,0.15);--correct-border:rgba(39,160,80,0.45);
  --wrong:rgba(192,57,43,0.15);--wrong-border:rgba(192,57,43,0.45);
}
html,body{min-height:100vh;background:var(--felt);color:var(--text-bright);font-family:'Noto Sans JP',sans-serif;font-size:14px;}
body{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.008) 0px,rgba(255,255,255,0.008) 1px,transparent 1px,transparent 12px),repeating-linear-gradient(-45deg,rgba(255,255,255,0.008) 0px,rgba(255,255,255,0.008) 1px,transparent 1px,transparent 12px),radial-gradient(ellipse 80% 40% at 50% 0%,var(--felt-mid) 0%,var(--felt) 60%);}
.nav{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:0.5px solid rgba(212,175,55,0.12);justify-content:space-between;}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-back{color:var(--gold-dim);text-decoration:none;font-size:13px;transition:color 0.15s;}
.nav-back:hover{color:var(--gold);}
.nav-title{font-family:'Zen Antique',serif;font-size:16px;color:var(--gold);letter-spacing:0.12em;}
.nav-score{font-size:13px;color:var(--text-mid);background:var(--sec-bg);border:0.5px solid var(--sec-border);border-radius:20px;padding:4px 14px;}
.nav-score span{color:var(--gold);font-weight:500;}
.page{max-width:660px;margin:0 auto;padding:24px 20px 64px;}
.progress-wrap{margin-bottom:20px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s ease;}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:12px;margin-bottom:12px;}
.badge-easy{background:rgba(39,160,80,0.15);color:rgba(100,210,130,0.9);border:0.5px solid rgba(39,160,80,0.35);}
.badge-mid{background:rgba(212,175,55,0.15);color:var(--gold);border:0.5px solid rgba(212,175,55,0.35);}
.badge-hard{background:rgba(192,57,43,0.15);color:rgba(220,100,80,0.9);border:0.5px solid rgba(192,57,43,0.35);}
.q-card{background:var(--sec-bg);border:0.5px solid var(--sec-border);border-radius:12px;padding:22px;margin-bottom:14px;animation:fadeIn 0.35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-no{font-size:12px;color:var(--text-dim);margin-bottom:4px;}
.q-text{font-size:15px;font-weight:500;color:var(--text-bright);line-height:1.7;margin-bottom:14px;}
/* 手牌表示エリア */
.tile-display{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;padding:10px 12px;background:rgba(0,0,0,0.2);border:0.5px solid rgba(255,255,255,0.08);border-radius:8px;align-items:flex-end;}
/* 面子グループ（通常） */
.meld-group{display:flex;gap:2px;align-items:flex-end;}
/* 鳴き面子グループ：左端牌を横向き＋少し下げる */
.meld-group.naki{align-items:flex-end;}
/* 通常牌 */
.tile-wrap{width:32px;height:44px;background:#f0ebe0;border-radius:3px;border-bottom:3px solid #b8a888;overflow:hidden;flex-shrink:0;}
.tile-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
/* 横向き牌（鳴き牌） */
.tile-wrap.yoko{width:44px;height:32px;border-bottom:none;border-right:3px solid #b8a888;margin-bottom:3px;}
.tile-wrap.yoko img{width:100%;height:100%;object-fit:cover;display:block;}
/* グループ間区切り */
.group-sep{width:6px;flex-shrink:0;}
.tile-note{font-size:11px;color:var(--text-dim);margin-bottom:12px;}
.cond-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.cond-pill{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);color:var(--text-mid);font-size:12px;}
.cond-pill.gold{background:rgba(212,175,55,0.12);border-color:rgba(212,175,55,0.3);color:var(--gold);}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:440px){.choices{grid-template-columns:1fr;}}
.choice-btn{padding:12px 10px;border-radius:8px;font-size:14px;font-weight:500;font-family:'Noto Serif JP',serif;border:0.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);color:var(--text-bright);cursor:pointer;letter-spacing:0.05em;transition:background 0.12s,border-color 0.12s,transform 0.08s;line-height:1.3;}
.choice-btn .kana{display:block;font-size:11px;color:var(--text-dim);font-family:'Noto Sans JP',sans-serif;margin-top:2px;font-weight:400;}
.choice-btn:hover:not(:disabled){background:rgba(212,175,55,0.12);border-color:var(--gold-dim);}
.choice-btn:active:not(:disabled){transform:scale(0.97);}
.choice-btn.correct{background:var(--correct);border-color:var(--correct-border);color:rgba(100,220,130,0.95);}
.choice-btn.correct .kana{color:rgba(100,220,130,0.7);}
.choice-btn.wrong{background:var(--wrong);border-color:var(--wrong-border);color:rgba(220,100,80,0.9);}
.choice-btn:disabled{cursor:default;}
.feedback{margin-top:14px;border-radius:10px;padding:14px 16px;display:none;animation:fadeIn 0.3s ease;}
.feedback.correct-fb{background:rgba(39,160,80,0.1);border:0.5px solid rgba(39,160,80,0.3);}
.feedback.wrong-fb{background:rgba(192,57,43,0.1);border:0.5px solid rgba(192,57,43,0.3);}
.fb-title{font-size:15px;font-weight:500;margin-bottom:6px;}
.fb-correct{color:rgba(100,220,130,0.95);}
.fb-wrong{color:rgba(220,100,80,0.9);}
.fb-body{font-size:13px;color:var(--text-mid);line-height:1.8;}
.next-btn{width:100%;margin-top:12px;padding:13px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;background:rgba(212,175,55,0.12);border:0.5px solid var(--gold-dim);border-radius:9px;cursor:pointer;color:var(--gold);letter-spacing:0.08em;transition:background 0.15s;display:none;}
.next-btn:hover{background:rgba(212,175,55,0.22);}
.result-screen{background:var(--sec-bg);border:0.5px solid var(--sec-border);border-radius:12px;padding:36px 24px;text-align:center;display:none;animation:fadeIn 0.4s ease;}
.res-title{font-family:'Zen Antique',serif;font-size:22px;color:var(--gold);letter-spacing:0.15em;margin-bottom:20px;}
.res-big{font-size:52px;font-weight:500;color:var(--gold);line-height:1;margin-bottom:6px;}
.res-denom{font-size:18px;color:var(--text-mid);margin-bottom:24px;}
.res-comment{font-size:14px;color:var(--text-mid);line-height:1.8;margin-bottom:28px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.retry-btn{padding:13px 32px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;background:rgba(212,175,55,0.12);border:0.5px solid var(--gold-dim);border-radius:9px;cursor:pointer;color:var(--gold);letter-spacing:0.08em;transition:background 0.15s;}
.retry-btn:hover{background:rgba(212,175,55,0.22);}
.home-btn{padding:13px 32px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;background:transparent;border:0.5px solid rgba(255,255,255,0.2);border-radius:9px;cursor:pointer;color:var(--text-mid);text-decoration:none;display:inline-block;transition:background 0.15s;}
.home-btn:hover{background:rgba(255,255,255,0.06);}
.mode-screen{text-align:center;padding:20px 0;}
.mode-title{font-family:'Zen Antique',serif;font-size:20px;color:var(--gold);margin-bottom:8px;letter-spacing:0.1em;}
.mode-sub{font-size:13px;color:var(--text-mid);margin-bottom:28px;line-height:1.7;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:440px;margin:0 auto 20px;}
@media(max-width:440px){.mode-grid{grid-template-columns:1fr;}}
.mode-btn{padding:20px 16px;border-radius:10px;background:var(--sec-bg);border:0.5px solid var(--sec-border);cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s;}
.mode-btn:hover{background:rgba(212,175,55,0.08);border-color:var(--gold-dim);}
.mode-btn-title{font-size:15px;font-weight:500;color:var(--text-bright);margin-bottom:4px;}
.mode-btn-sub{font-size:12px;color:var(--text-mid);}
.mode-btn-badge{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px;}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-left">
    <a class="nav-back" href="index.html">← 道場へ戻る</a>
    <span style="color:var(--text-dim)">|</span>
    <span class="nav-title">役名クイズ</span>
  </div>
  <div class="nav-score">正答 <span id="nav-correct">0</span> / <span id="nav-total">0</span></div>
</nav>
<div class="page">
  <div id="mode-screen" class="mode-screen">
    <div class="mode-title">役名クイズ</div>
    <div class="mode-sub">手牌の形を見て役名を当てましょう。<br>横向きの牌は鳴き（ポン・チー）した牌です。</div>
    <div class="mode-grid">
      <button class="mode-btn" onclick="startQuiz('easy')">
        <span class="mode-btn-badge badge badge-easy">初級</span>
        <div class="mode-btn-title">初級モード</div>
        <div class="mode-btn-sub">頻出役10問</div>
      </button>
      <button class="mode-btn" onclick="startQuiz('mid')">
        <span class="mode-btn-badge badge badge-mid">中級</span>
        <div class="mode-btn-title">中級モード</div>
        <div class="mode-btn-sub">やや難しい役10問</div>
      </button>
      <button class="mode-btn" onclick="startQuiz('hard')">
        <span class="mode-btn-badge badge badge-hard">上級</span>
        <div class="mode-btn-title">上級モード</div>
        <div class="mode-btn-sub">難役・役満10問</div>
      </button>
      <button class="mode-btn" onclick="startQuiz('all')">
        <span class="mode-btn-badge" style="background:rgba(212,175,55,0.15);color:var(--gold);border:0.5px solid rgba(212,175,55,0.3);">全問</span>
        <div class="mode-btn-title">全問モード</div>
        <div class="mode-btn-sub">全難易度混合20問</div>
      </button>
    </div>
    <a class="home-btn" href="yaku.html">役一覧を見る →</a>
  </div>
  <div id="progress-area" style="display:none">
    <div class="progress-wrap">
      <div class="progress-info"><span id="prog-label">問題 1 / 10</span><span id="prog-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="quiz-area" style="display:none">
    <div class="q-card" id="q-card">
      <div class="q-no" id="q-no">Q1</div>
      <div class="badge" id="q-badge">初級</div>
      <div class="q-text" id="q-text"></div>
      <div class="tile-display" id="q-tiles"></div>
      <div class="tile-note" id="q-note"></div>
      <div class="cond-row" id="q-cond"></div>
      <div class="choices" id="q-choices"></div>
      <div class="feedback" id="feedback">
        <div class="fb-title" id="fb-title"></div>
        <div class="fb-body" id="fb-body"></div>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
    </div>
  </div>
  <div class="result-screen" id="result-screen">
    <div class="res-title">お疲れ様でした</div>
    <div class="res-big" id="res-big">0</div>
    <div class="res-denom" id="res-denom">/ 10 問正解</div>
    <div class="res-comment" id="res-comment"></div>
    <div class="btn-row">
      <button class="retry-btn" onclick="backToMode()">モード選択へ</button>
      <a class="home-btn" href="yaku.html">役一覧を見る</a>
    </div>
  </div>
</div>

<script>
const TILE_IMG_BASE='img/tiles/';
function tileFile(key){return TILE_IMG_BASE+key+'.png';}

function makeTile(key, isYoko){
  const wrap=document.createElement('div');
  wrap.className='tile-wrap'+(isYoko?' yoko':'');
  const img=document.createElement('img');
  const src=isYoko?tileFile(key+'_yoko'):tileFile(key);
  img.src=src; img.alt=key;
  img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
  wrap.appendChild(img);
  return wrap;
}

/*
  問題データ構造:
  groups: 面子・雀頭の配列
    各グループ: {tiles:[キー配列], naki:bool}
    naki:true → 先頭牌を横向き表示（ポン・チーの表現）
  ※ grpの並び順がそのまま手牌の左→右の表示順になる
  ※ 単一の役のみ成立する手牌・あがり形であること
*/
const QUESTIONS_EASY = [

  // Q1 平和: 門前・順子のみ・役牌以外雀頭・両面待ち
  // 手: ②③④ ⑥⑦⑧ 三四五 七八九 + 雀頭⑤⑤（中張）
  // 役: 平和のみ（断么九なし→七を含む=端牌に近いが2〜8内なのでタンヤオも複合→排除するため一を含める）
  // → 手: 一二三 ⑥⑦⑧ 三四五(sou) 七八九(sou) 雀頭⑤⑤  待ち:三or六索（両面）
  // タンヤオ複合しないよう一萬を入れる
  {difficulty:'easy',
   text:'この手牌の形はどの役でしょう？（門前・テンパイ形）',
   groups:[
     {tiles:['man1','man2','man3'],naki:false},
     {tiles:['pin6','pin7','pin8'],naki:false},
     {tiles:['sou4','sou5','sou6'],naki:false},
     {tiles:['sou7','sou8','sou9'],naki:false},
     {tiles:['pin4','pin4'],naki:false},
   ],
   note:'雀頭：④④（筒子）　4面子すべて順子　両面待ち',
   conds:[{label:'門前',gold:false},{label:'順子のみ',gold:false},{label:'雀頭が役牌以外',gold:false},{label:'両面待ち',gold:false}],
   answer:'平和',kana:'ピンフ',
   choices:[{name:'平和',kana:'ピンフ'},{name:'断么九',kana:'タンヤオ'},{name:'立直',kana:'リーチ'},{name:'一気通貫',kana:'イッキツウカン'}],
   explanation:'平和（ピンフ）：①門前 ②4面子すべて順子 ③雀頭が役牌以外 ④両面待ち の4条件で成立する1翻役。符が付かないためロン30符・ツモ20符固定。'},

  // Q2 断么九: 中張牌のみ・門前 / 平和にならないよう刻子を混ぜる
  // 手: ②②② ⑤⑥⑦ 三四五 六七八 雀頭③③
  {difficulty:'easy',
   text:'この手牌の形はどの役でしょう？',
   groups:[
     {tiles:['pin2','pin2','pin2'],naki:false},
     {tiles:['pin5','pin6','pin7'],naki:false},
     {tiles:['man3','man4','man5'],naki:false},
     {tiles:['man6','man7','man8'],naki:false},
     {tiles:['pin3','pin3'],naki:false},
   ],
   note:'1・9・字牌が一枚もない。刻子①がある',
   conds:[{label:'1・9・字牌なし',gold:true},{label:'鳴きでも成立',gold:false}],
   answer:'断么九',kana:'タンヤオ',
   choices:[{name:'断么九',kana:'タンヤオ'},{name:'平和',kana:'ピンフ'},{name:'混一色',kana:'ホンイツ'},{name:'対々和',kana:'トイトイ'}],
   explanation:'断么九（タンヤオ）：数牌の2〜8（中張牌）だけで手を完成させる1翻役。1・9・字牌を一枚も使わないのがポイント。鳴いてもOK。'},

  // Q3 七対子: 7種類の対子
  {difficulty:'easy',
   text:'この手牌の形はどの役でしょう？',
   groups:[
     {tiles:['man2','man2'],naki:false},
     {tiles:['man7','man7'],naki:false},
     {tiles:['pin3','pin3'],naki:false},
     {tiles:['pin8','pin8'],naki:false},
     {tiles:['sou4','sou4'],naki:false},
     {tiles:['ton','ton'],naki:false},
     {tiles:['haku','haku'],naki:false},
   ],
   note:'14枚すべて対子（2枚組）が7組',
   conds:[{label:'対子7組',gold:true},{label:'門前のみ',gold:false},{label:'25符固定',gold:false}],
   answer:'七対子',kana:'チートイツ',
   choices:[{name:'七対子',kana:'チートイツ'},{name:'対々和',kana:'トイトイ'},{name:'混老頭',kana:'ホンロウトウ'},{name:'平和',kana:'ピンフ'}],
   explanation:'七対子（チートイツ）：異なる7種の対子を揃える2翻役。符は25符固定。同じ牌4枚での2組は認められない。'},

  // Q4 役牌（中）: ポン形 / 他は普通の順子・雀頭は数牌
  {difficulty:'easy',
   text:'この手牌の形はどの役でしょう？',
   groups:[
     {tiles:['tyun','tyun','tyun'],naki:true},
     {tiles:['pin2','pin3','pin4'],naki:false},
     {tiles:['pin6','pin7','pin8'],naki:false},
     {tiles:['man3','man4','man5'],naki:false},
     {tiles:['pin5','pin5'],naki:false},
   ],
   note:'中（三元牌）の刻子：横向きは鳴き（ポン）した牌',
   conds:[{label:'三元牌の刻子',gold:true},{label:'鳴きOK',gold:false}],
   answer:'役牌（中）',kana:'ヤクハイ',
   choices:[{name:'役牌（中）',kana:'ヤクハイ'},{name:'平和',kana:'ピンフ'},{name:'断么九',kana:'タンヤオ'},{name:'対々和',kana:'トイトイ'}],
   explanation:'役牌（ヤクハイ）：三元牌（白・發・中）または場風・自風を刻子で揃える1翻役。鳴いてOK。横向きの牌はポンした牌。'},

  // Q5 対々和: 鳴きあり・刻子4組。三暗刻複合しないよう鳴き2組
  {difficulty:'easy',
   text:'この手牌の形はどの役でしょう？',
   groups:[
     {tiles:['man3','man3','man3'],naki:true},
     {tiles:['pin7','pin7','pin7'],naki:true},
     {tiles:['sou5','sou5','sou5'],naki:false},
     {tiles:['sou9','sou9','sou9'],naki:false},
     {tiles:['man1','man1'],naki:false},
   ],
   note:'4面子すべて刻子。横向き2組は鳴き（ポン）',
   conds:[{label:'4面子すべて刻子',gold:true},{label:'鳴きOK',gold:false}],
   answer:'対々和',kana:'トイトイ',
   choices:[{name:'対々和',kana:'トイトイ'},{name:'七対子',kana:'チートイツ'},{name:'三暗刻',kana:'サンアンコウ'},{name:'混老頭',kana:'ホンロウトウ'}],
   explanation:'対々和（トイトイ）：4組の面子をすべて刻子で揃える2翻役。鳴いてもOK。横向きはポンした牌。'},

  // Q6 一気通貫: 鳴き版（鳴き1翻）。チー牌で三色複合しないよう索子のみ
  {difficulty:'easy',
   text:'この手牌の形はどの役でしょう？',
   groups:[
     {tiles:['man1','man2','man3'],naki:true},
     {tiles:['man4','man5','man6'],naki:true},
     {tiles:['man7','man8','man9'],naki:false},
     {tiles:['pin3','pin3','pin3'],naki:false},
     {tiles:['sou5','sou5'],naki:false},
   ],
   note:'萬子で1-2-3・4-5-6・7-8-9の3順子（横は鳴き）',

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let qList=[],qIdx=0,correctCount=0,answered=false;

function startQuiz(mode){
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('progress-area').style.display='block';
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('result-screen').style.display='none';
  if(mode==='easy') qList=shuffle([...QUESTIONS_EASY]);
  else if(mode==='mid') qList=shuffle([...QUESTIONS_MID]);
  else if(mode==='hard') qList=shuffle([...QUESTIONS_HARD]);
  else qList=shuffle([...QUESTIONS_EASY,...QUESTIONS_MID,...QUESTIONS_HARD]).slice(0,20);
  qIdx=0; correctCount=0; answered=false;
  document.getElementById('nav-correct').textContent=0;
  document.getElementById('nav-total').textContent=0;
  showQuestion();
}

function renderHand(q){
  const el=document.getElementById('q-tiles');
  el.innerHTML='';
  q.groups.forEach((grp,gi)=>{
    if(gi>0){
      const sep=document.createElement('span');
      sep.className='group-sep'; el.appendChild(sep);
    }
    const div=document.createElement('div');
    div.className='meld-group'+(grp.naki?' naki':'');
    grp.tiles.forEach((key,ti)=>{
      const isYoko=grp.naki&&ti===0;
      div.appendChild(makeTile(key,isYoko));
    });
    el.appendChild(div);
  });
}

function showQuestion(){
  const q=qList[qIdx]; answered=false;
  const pct=Math.round(qIdx/qList.length*100);
  document.getElementById('prog-label').textContent='問題 '+(qIdx+1)+' / '+qList.length;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('q-no').textContent='Q'+(qIdx+1);
  const dm={easy:['初級','badge-easy'],mid:['中級','badge-mid'],hard:['上級','badge-hard']};
  const badge=document.getElementById('q-badge');
  badge.textContent=dm[q.difficulty][0]; badge.className='badge '+dm[q.difficulty][1];
  document.getElementById('q-text').textContent=q.text;
  renderHand(q);
  document.getElementById('q-note').textContent=q.note||'';
  document.getElementById('q-cond').innerHTML=(q.conds||[]).map(c=>'<span class="cond-pill'+(c.gold?' gold':'')+'">'+c.label+'</span>').join('');
  const shuffled=shuffle([...q.choices]);
  const choicesEl=document.getElementById('q-choices');
  choicesEl.innerHTML='';
  shuffled.forEach(ch=>{
    const b=document.createElement('button');
    b.className='choice-btn';
    b.innerHTML=ch.name+'<span class="kana">'+ch.kana+'</span>';
    b.dataset.name=ch.name;
    b.onclick=()=>selectAnswer(ch.name,q);
    choicesEl.appendChild(b);
  });
  document.getElementById('feedback').style.display='none';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='fadeIn 0.35s ease';
}

function selectAnswer(name,q){
  if(answered)return; answered=true;
  const isCorrect=name===q.answer;
  if(isCorrect)correctCount++;
  document.getElementById('nav-correct').textContent=correctCount;
  document.getElementById('nav-total').textContent=qIdx+1;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.name===q.answer) b.classList.add('correct');
    else if(b.dataset.name===name&&!isCorrect) b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.style.display='block'; fb.className='feedback '+(isCorrect?'correct-fb':'wrong-fb');
  const title=document.getElementById('fb-title');
  title.className='fb-title '+(isCorrect?'fb-correct':'fb-wrong');
  title.textContent=isCorrect?'✓ 正解！':'✗ 不正解　正解は「'+q.answer+'（'+q.kana+'）」';
  document.getElementById('fb-body').textContent=q.explanation;
  const nb=document.getElementById('next-btn');
  nb.style.display='block'; nb.textContent=(qIdx+1<qList.length)?'次の問題 →':'結果を見る';
}

function nextQuestion(){qIdx++;if(qIdx>=qList.length)showResult();else showQuestion();}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('progress-area').style.display='none';
  const rs=document.getElementById('result-screen'); rs.style.display='block';
  document.getElementById('res-big').textContent=correctCount;
  document.getElementById('res-denom').textContent='/ '+qList.length+' 問正解';
  const pct=Math.round(correctCount/qList.length*100);
  let c='';
  if(pct>=90) c='完璧です！役の形をしっかり覚えています。次は点数クイズに挑戦してみましょう。';
  else if(pct>=70) c='よくできました！間違えた役を役一覧で確認してみましょう。';
  else if(pct>=50) c='もう少しです。役一覧を見ながらもう一度挑戦してみましょう。';
  else c='役一覧を見て覚えてから再チャレンジしましょう。焦らず少しずつ覚えれば大丈夫。';
  document.getElementById('res-comment').textContent=c;
}

function backToMode(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('mode-screen').style.display='block';
  document.getElementById('nav-correct').textContent=0;
  document.getElementById('nav-total').textContent=0;
}
</script>
